name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-ios:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version && xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: bash ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick latest iPhone simulator
        id: pick-sim
        run: |
          dev=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; data=json.load(sys.stdin)['devices']; \
            picks=[(rt,d) for rt,ds in data.items() if 'iOS' in rt for d in ds if d.get('isAvailable') and d['name'].startswith('iPhone')]; \
            picks.sort(key=lambda x: x[0], reverse=True); \
            print(f\"platform=iOS Simulator,name={picks[0][1]['name']},OS={picks[0][0].split('iOS-')[-1].replace('-','.')}\")")
          echo "destination=$dev" >> "$GITHUB_OUTPUT"
          echo "Using: $dev"

      - name: Build & test (iOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination '${{ steps.pick-sim.outputs.destination }}' \
            -resultBundlePath build/ios.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  build-test-ipad:
    name: Build & Test (iPad Simulator)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version && xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: bash ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick latest iPad simulator
        id: pick-sim
        run: |
          dev=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; data=json.load(sys.stdin)['devices']; \
            picks=[(rt,d) for rt,ds in data.items() if 'iOS' in rt for d in ds if d.get('isAvailable') and d['name'].startswith('iPad')]; \
            picks.sort(key=lambda x: x[0], reverse=True); \
            print(f\"platform=iOS Simulator,name={picks[0][1]['name']},OS={picks[0][0].split('iOS-')[-1].replace('-','.')}\")")
          echo "destination=$dev" >> "$GITHUB_OUTPUT"
          echo "Using: $dev"

      - name: Build & test (iPad)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination '${{ steps.pick-sim.outputs.destination }}' \
            -resultBundlePath build/ipad.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version && xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: bash ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (macOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination 'platform=macOS' \
            -resultBundlePath build/macos.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint (Docker)
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
