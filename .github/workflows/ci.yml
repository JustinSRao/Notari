name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-ios:
    name: Build & Test (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (iOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -resultBundlePath build/ios.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  build-test-ipad:
    name: Build & Test (iPad Simulator)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (iPad)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination 'platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation),OS=17.5' \
            -resultBundlePath build/ipad.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch fonts
        run: ./scripts/fetch_fonts.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (macOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project Notari.xcodeproj \
            -scheme Notari \
            -destination 'platform=macOS' \
            -resultBundlePath build/macos.xcresult \
            clean test \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run SwiftLint (Docker)
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict
