name: Notari
options:
  bundleIdPrefix: com.notari
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  Notari:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/Notari
    resources:
      - path: Sources/Notari/Resources/Assets.xcassets
      - path: Sources/Notari/Resources/Fonts
        type: folder
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notari.app
        INFOPLIST_FILE: Sources/Notari/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"

  NotariTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: NotariTests
    dependencies:
      - target: Notari
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notari.app.tests
        GENERATE_INFOPLIST_FILE: YES
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Notari.app/Contents/MacOS/Notari"
        "TEST_HOST[sdk=iphoneos*]": "$(BUILT_PRODUCTS_DIR)/Notari.app/Notari"
        "TEST_HOST[sdk=iphonesimulator*]": "$(BUILT_PRODUCTS_DIR)/Notari.app/Notari"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Notari:
    build:
      targets:
        Notari: all
        NotariTests: [test]
    test:
      targets:
        - NotariTests
    run:
      config: Debug
    archive:
      config: Release
